version: 2
updates:
- package-ecosystem: gradle
  cooldown:
    default-days: 7
  directory: /
  schedule:
    interval: weekly
- package-ecosystem: github-actions
  cooldown:
    default-days: 7
  directory: /
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  schedule:
    interval: weekly
